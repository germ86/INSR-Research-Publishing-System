name: INSR validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: insr-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Static validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate shell syntax
        shell: bash
        run: |
          bash -n tests/run-tests.sh
          bash -n scripts/test.sh

      - name: Run static test suite
        shell: bash
        run: bash scripts/test.sh --static-only

  l3build-regression:
    name: l3build regression checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: static-validation
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install l3build toolchain
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            texlive-luatex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            lmodern

      - name: Run l3build check
        shell: bash
        run: l3build check

      - name: Upload l3build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: l3build-diagnostics
          path: |
            build/**/*.log
            build/**/*.diff
            build/**/*.tlg
            testfiles/*.log
          if-no-files-found: ignore
          retention-days: 7

  lualatex-build:
    name: LuaLaTeX build matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: static-validation
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LuaLaTeX toolchain
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            latexmk \
            texlive-luatex \
            biber \
            texlive-bibtex-extra \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            fonts-freefont-otf \
            fonts-hosny-amiri \
            fonts-noto-core \
            fonts-noto-cjk

      - name: Verify required TeX packages
        shell: bash
        run: |
          kpsewhich biblatex.sty >/dev/null
          kpsewhich fontspec.sty >/dev/null
          kpsewhich unicode-math.sty >/dev/null

      - name: Run required compile suite
        shell: bash
        run: bash scripts/test.sh --compile

      - name: Upload failing logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-build-logs
          path: |
            **/*.log
            **/*.blg
            **/*.bbl
            **/*.fls
            **/*.fdb_latexmk
          if-no-files-found: ignore
          retention-days: 7

  ctan-smoke:
    name: CTAN packaging smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - static-validation
      - l3build-regression
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install packaging toolchain
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            biber \
            texlive-luatex \
            texlive-bibtex-extra \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            fonts-noto-core \
            unzip

      - name: Build CTAN archive
        shell: bash
        run: l3build ctan

      - name: Inspect CTAN archive
        shell: bash
        run: |
          set -euo pipefail
          archive="$(find . -maxdepth 3 -type f -name '*.zip' | sort | head -n 1)"
          test -n "$archive"
          unzip -l "$archive" | tee ctan-archive-listing.txt
          ! grep -E '\.(aux|toc|log|out|fls|fdb_latexmk)( |$)' ctan-archive-listing.txt
          grep -E '(^|/)LICENSE( |$)' ctan-archive-listing.txt
          grep -E '(^|/)README\.md( |$)' ctan-archive-listing.txt
          grep -E 'tex/latex/insr/insr-core\.sty' ctan-archive-listing.txt

      - name: Upload CTAN archive
        uses: actions/upload-artifact@v4
        with:
          name: ctan-smoke-archive
          path: |
            *.zip
            build/distrib/*.zip
            ctan-archive-listing.txt
          if-no-files-found: warn
          retention-days: 14
