name: INSR validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  TEXINPUTS: ".:./examples//:"
  BIBINPUTS: ".//:"

concurrency:
  group: insr-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Static validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate shell syntax
        shell: bash
        run: |
          bash -n tests/run-tests.sh
          bash -n scripts/test.sh

      - name: Run static test suite
        shell: bash
        run: bash scripts/test.sh --static-only

  l3build-regression:
    name: l3build regression checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: static-validation
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install l3build toolchain
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            texlive-luatex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            lmodern

      - name: Run l3build check
        shell: bash
        run: l3build check

      - name: Upload l3build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: l3build-diagnostics
          path: |
            build/**/*.log
            build/**/*.diff
            build/**/*.tlg
            testfiles/*.log
          if-no-files-found: ignore
          retention-days: 7

  lualatex-build:
    name: LuaLaTeX build matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: static-validation
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LuaLaTeX toolchain
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            latexmk \
            texlive-luatex \
            biber \
            texlive-bibtex-extra \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            fonts-freefont-otf \
            fonts-hosny-amiri \
            fonts-noto-core \
            fonts-noto-cjk

      - name: Verify required TeX packages
        shell: bash
        run: |
          kpsewhich biblatex.sty >/dev/null
          kpsewhich fontspec.sty >/dev/null
          kpsewhich unicode-math.sty >/dev/null

      - name: Run required compile suite
        shell: bash
        run: bash scripts/test.sh --compile

      - name: Upload failing logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-build-logs
          path: |
            **/*.log
            **/*.blg
            **/*.bbl
            **/*.fls
            **/*.fdb_latexmk
          if-no-files-found: ignore
          retention-days: 7

  root-smoke:
    name: Root smoke document
    runs-on: ubuntu-latest
    needs: static-validation
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install LuaLaTeX toolchain
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            latexmk \
            texlive-luatex \
            biber \
            texlive-bibtex-extra \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            fonts-freefont-otf \
            fonts-hosny-amiri \
            fonts-noto-core \
            fonts-noto-cjk
      - name: Build root smoke document
        run: |
          mkdir -p build/ci/root
          latexmk -lualatex -interaction=nonstopmode -halt-on-error -outdir=build/ci/root main.tex
      - name: Reject INSR warning regressions
        run: python3 tools/check_latex_log.py build/ci/root/main.log
      - name: Upload failing LaTeX diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-diagnostics-root-smoke
          path: |
            **/*.log
            **/*.blg
            **/*.bbl
            **/*.bcf
            **/*.run.xml
            **/*.fls
            **/*.fdb_latexmk
          if-no-files-found: ignore
          retention-days: 7

  paper-examples:
    name: Paper examples (${{ matrix.document }})
    runs-on: ubuntu-latest
    needs: static-validation
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        document:
          - examples/minimal-paper/main.tex
          - examples/paper-demo.tex
          - examples/minimal-english-paper.tex
          - examples/position-paper/main.tex
          - examples/arabic-rtl-paper.tex
          - examples/multi-institution-consortium-paper.tex
          - examples/publication-minimal/main.tex
          - examples/publication-journal-article/main.tex
          - examples/publication-position-paper/main.tex
          - examples/publication-blind-review/main.tex
          - examples/publication-zenodo-preprint/main.tex
          - examples/publication-multi-author/main.tex
          - examples/publication-funded-research/main.tex
          - examples/reference-publication/paper.tex
          - tests/fixtures/rct-combination-as-output-target.tex
    steps:
      - uses: actions/checkout@v4
      - name: Install LuaLaTeX toolchain
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            latexmk \
            texlive-luatex \
            biber \
            texlive-bibtex-extra \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            fonts-freefont-otf \
            fonts-hosny-amiri \
            fonts-noto-core \
            fonts-noto-cjk
      - name: Build PDF
        run: |
          document="${{ matrix.document }}"
          output_dir="build/ci/${document%.*}"
          mkdir -p "$output_dir"
          latexmk -lualatex -interaction=nonstopmode -halt-on-error -outdir="$output_dir" "$document"
          log_file="$output_dir/$(basename "${document%.*}").log"
          python3 tools/check_latex_log.py "$log_file"
      - name: Upload failing LaTeX diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-diagnostics-${{ github.job }}-${{ strategy.job-index }}
          path: |
            **/*.log
            **/*.blg
            **/*.bbl
            **/*.bcf
            **/*.run.xml
            **/*.fls
            **/*.fdb_latexmk
          if-no-files-found: ignore
          retention-days: 7

  slides-examples:
