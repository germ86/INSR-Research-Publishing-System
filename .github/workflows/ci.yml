          name: latex-diagnostics-${{ github.job }}-${{ strategy.job-index }}
          path: |
            **/*.log
            **/*.blg
            **/*.bbl
            **/*.bcf
            **/*.run.xml
            **/*.fls
            **/*.fdb_latexmk
          if-no-files-found: ignore
          retention-days: 7

  manual-examples:
    name: Manual examples (${{ matrix.document }})
    runs-on: ubuntu-latest
    needs: static-validation
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        document:
          - examples/clinical-manual/main.tex
          - examples/manual-demo.tex
          - doc/latex/insr/insr-latex-manual.tex
    steps:
      - uses: actions/checkout@v4
      - name: Install LuaLaTeX toolchain
