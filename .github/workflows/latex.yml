name: Build LaTeX

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  TEXINPUTS: .:./examples//:
  BIBINPUTS: .//:

jobs:
  static-validation:
    name: Static repository validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run static validators
        run: |
          python3 tools/overleaf_doctor.py check
          python3 tools/validate_project.py
          python3 tools/validate_bibliography.py references.bib
          python3 tools/validate_palette.py
          python3 -m unittest tests/test_overleaf_doctor.py tests/test_config_static.py tests/test_publication_layer_static.py tests/test_release_metadata_static.py tests/test_latex_log_checker.py tests/test_color_contrast_static.py
          python3 tools/insr_metadata.py validate
          python3 tools/insr_metadata.py export-all --outdir build/metadata
          python3 tools/insr_release.py prepare --version ci-alpha
          bash tests/run-tests.sh --static-only

  root-smoke:
    name: Root smoke document
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LuaLaTeX toolchain
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            latexmk \
            texlive-luatex \
            biber \
            texlive-bibtex-extra \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            fonts-freefont-otf \
            fonts-hosny-amiri \
            fonts-noto-core \
            fonts-noto-cjk
      - name: Verify TeX toolchain
        run: |
          command -v latexmk
          command -v lualatex
          command -v biber
          kpsewhich biblatex.sty >/dev/null
          kpsewhich fontspec.sty >/dev/null
      - name: Compile root smoke document
        run: latexmk -lualatex -interaction=nonstopmode -halt-on-error main.tex
      - name: Reject INSR warning regressions
        run: python3 tools/check_latex_log.py main.log

  paper-examples:
    name: Paper examples (${{ matrix.document }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        document:
          - examples/minimal-paper/main.tex
          - examples/paper-demo.tex
          - examples/minimal-english-paper.tex
          - examples/position-paper/main.tex
          - examples/arabic-rtl-paper.tex
          - examples/multi-institution-consortium-paper.tex
          - examples/publication-minimal/main.tex
          - examples/publication-journal-article/main.tex
          - examples/publication-position-paper/main.tex
          - examples/publication-blind-review/main.tex
          - examples/publication-zenodo-preprint/main.tex
          - examples/publication-multi-author/main.tex
          - examples/publication-funded-research/main.tex
          - examples/reference-publication/paper.tex
          - tests/fixtures/rct-combination-as-output-target.tex
    steps:
      - uses: actions/checkout@v4
