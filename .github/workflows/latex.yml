name: Build LaTeX

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Delegate to INSR validation workflow
        shell: bash
        run: |
          echo "The authoritative LuaLaTeX, l3build, CTAN smoke and installed-package checks live in .github/workflows/ci.yml."
          echo "This compatibility workflow preserves the historical Build LaTeX status while avoiding a second, divergent LaTeX toolchain."
          echo "Use the INSR validation workflow for merge-blocking diagnostics."
